<svg viewBox="0 0 820 780" xmlns="http://www.w3.org/2000/svg" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;">
  <rect width="820" height="780" fill="#f8f9fb" rx="10"/>

  <!-- Feature 1: Start Game -->
  <rect x="15" y="15" width="390" height="230" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="15" y="15" width="4" height="230" rx="2" fill="#dc2626"/>
  <text x="40" y="42" fill="#1e293b" font-size="13" font-weight="700">1 Start Game</text>
  <rect x="40" y="52" width="82" height="18" rx="9" fill="#fef2f2" stroke="#fecaca" stroke-width="0.5"/>
  <text x="81" y="64" text-anchor="middle" fill="#dc2626" font-size="8" font-weight="600">AI vs AI</text>
  <rect x="130" y="52" width="90" height="18" rx="9" fill="#fef2f2" stroke="#fecaca" stroke-width="0.5"/>
  <text x="175" y="64" text-anchor="middle" fill="#dc2626" font-size="8" font-weight="600">AI + Human</text>
  <rect x="228" y="52" width="105" height="18" rx="9" fill="#fef2f2" stroke="#fecaca" stroke-width="0.5"/>
  <text x="280" y="64" text-anchor="middle" fill="#dc2626" font-size="8" font-weight="600">Human + Coach</text>

  <text x="40" y="88" fill="#64748b" font-size="9.5">CoachBot guides you step by step:</text>
  <text x="40" y="104" fill="#64748b" font-size="9.5">create or join a PokerNow room, add AI</text>
  <text x="40" y="120" fill="#64748b" font-size="9.5">opponents, and start playing — all via chat.</text>

  <rect x="40" y="136" width="340" height="1" fill="#e2e8f0"/>
  <text x="40" y="154" fill="#94a3b8" font-size="8" font-weight="600">FLOW</text>
  <text x="40" y="172" fill="#475569" font-size="9">CoachBot Welcome</text>
  <text x="155" y="172" fill="#94a3b8" font-size="9">select "Start Game"</text>
  <text x="40" y="190" fill="#475569" font-size="9">  A Create room</text>
  <text x="155" y="190" fill="#94a3b8" font-size="9">— CoachBot creates PokerNow link</text>
  <text x="40" y="208" fill="#475569" font-size="9">  B Join room</text>
  <text x="155" y="208" fill="#94a3b8" font-size="9">— Paste your link, CoachBot connects</text>
  <text x="40" y="226" fill="#475569" font-size="9">  Then:</text>
  <text x="80" y="226" fill="#94a3b8" font-size="9">"Add AI opponents?" — add bots anytime</text>

  <!-- Feature 2: Live Coaching -->
  <rect x="415" y="15" width="390" height="230" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="415" y="15" width="4" height="230" rx="2" fill="#0d9488"/>
  <text x="440" y="42" fill="#1e293b" font-size="13" font-weight="700">2 Live GTO Coaching</text>
  <rect x="440" y="52" width="62" height="18" rx="9" fill="#e6fffa" stroke="#99f6e4" stroke-width="0.5"/>
  <text x="471" y="64" text-anchor="middle" fill="#0d9488" font-size="8" font-weight="600">Equity</text>
  <rect x="510" y="52" width="72" height="18" rx="9" fill="#e6fffa" stroke="#99f6e4" stroke-width="0.5"/>
  <text x="546" y="64" text-anchor="middle" fill="#0d9488" font-size="8" font-weight="600">Pot Odds</text>
  <rect x="590" y="52" width="62" height="18" rx="9" fill="#e6fffa" stroke="#99f6e4" stroke-width="0.5"/>
  <text x="621" y="64" text-anchor="middle" fill="#0d9488" font-size="8" font-weight="600">Range</text>
  <rect x="660" y="52" width="55" height="18" rx="9" fill="#e6fffa" stroke="#99f6e4" stroke-width="0.5"/>
  <text x="687" y="64" text-anchor="middle" fill="#0d9488" font-size="8" font-weight="600">EV</text>
  <rect x="723" y="52" width="55" height="18" rx="9" fill="#e6fffa" stroke="#99f6e4" stroke-width="0.5"/>
  <text x="750" y="64" text-anchor="middle" fill="#0d9488" font-size="8" font-weight="600">SPR</text>

  <text x="440" y="88" fill="#64748b" font-size="9.5">CoachBot reads your cards via browser bridge,</text>
  <text x="440" y="104" fill="#64748b" font-size="9.5">reasons through ranges step by step, runs GTO</text>
  <text x="440" y="120" fill="#64748b" font-size="9.5">tools inline with reasoning. Each tool result</text>
  <text x="440" y="136" fill="#64748b" font-size="9.5">tagged with small icon: ⚙ equity.py 52.3%</text>

  <rect x="440" y="148" width="340" height="1" fill="#e2e8f0"/>
  <text x="440" y="166" fill="#94a3b8" font-size="8" font-weight="600">USAGE</text>
  <text x="440" y="184" fill="#475569" font-size="9">"帮我盯着"</text>
  <text x="540" y="184" fill="#94a3b8" font-size="9">— Auto mode: analyze every hand</text>
  <text x="440" y="202" fill="#475569" font-size="9">"这手怎么打？"</text>
  <text x="570" y="202" fill="#94a3b8" font-size="9">— On-demand analysis</text>
  <text x="440" y="220" fill="#475569" font-size="9">"替我做决定"</text>
  <text x="565" y="220" fill="#94a3b8" font-size="9">— CoachBot decides + executes</text>

  <!-- Feature 3: Hand Review -->
  <rect x="15" y="260" width="390" height="230" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="15" y="260" width="4" height="230" rx="2" fill="#2563eb"/>
  <text x="40" y="287" fill="#1e293b" font-size="13" font-weight="700">3 Hand Review</text>
  <rect x="40" y="297" width="85" height="18" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="0.5"/>
  <text x="82" y="309" text-anchor="middle" fill="#2563eb" font-size="8" font-weight="600">Post-Game</text>
  <rect x="133" y="297" width="75" height="18" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="0.5"/>
  <text x="170" y="309" text-anchor="middle" fill="#2563eb" font-size="8" font-weight="600">History</text>
  <rect x="216" y="297" width="80" height="18" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="0.5"/>
  <text x="256" y="309" text-anchor="middle" fill="#2563eb" font-size="8" font-weight="600">Manual</text>

  <text x="40" y="333" fill="#64748b" font-size="9.5">All hands auto-saved to history.jsonl (actions,</text>
  <text x="40" y="349" fill="#64748b" font-size="9.5">board, results, showdown cards). After game ends,</text>
  <text x="40" y="365" fill="#64748b" font-size="9.5">CoachBot offers full review or pick specific</text>
  <text x="40" y="381" fill="#64748b" font-size="9.5">hands. Or manually describe a hand to analyze.</text>

  <rect x="40" y="395" width="340" height="1" fill="#e2e8f0"/>
  <text x="40" y="413" fill="#94a3b8" font-size="8" font-weight="600">FLOW</text>
  <text x="40" y="431" fill="#475569" font-size="9">Game ends</text>
  <text x="110" y="431" fill="#94a3b8" font-size="9">— "Review all" or "Pick hands to review"</text>
  <text x="40" y="449" fill="#475569" font-size="9">Welcome - Analyze</text>
  <text x="150" y="449" fill="#94a3b8" font-size="9">— From history or manual input</text>
  <text x="40" y="467" fill="#475569" font-size="9">"帮我分析之前的牌"</text>
  <text x="195" y="467" fill="#94a3b8" font-size="9">— Anytime, reads history.jsonl</text>

  <!-- Feature 4: PlayBots -->
  <rect x="415" y="260" width="390" height="230" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="415" y="260" width="4" height="230" rx="2" fill="#7c3aed"/>
  <text x="440" y="287" fill="#1e293b" font-size="13" font-weight="700">4 PlayBots — AI Opponents</text>
  <rect x="440" y="297" width="72" height="18" rx="9" fill="#fef2f2" stroke="#fecaca" stroke-width="0.5"/>
  <text x="476" y="309" text-anchor="middle" fill="#dc2626" font-size="8" font-weight="600">Fish haiku</text>
  <rect x="520" y="297" width="95" height="18" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="0.5"/>
  <text x="567" y="309" text-anchor="middle" fill="#2563eb" font-size="8" font-weight="600">Regular sonnet</text>
  <rect x="623" y="297" width="82" height="18" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="0.5"/>
  <text x="664" y="309" text-anchor="middle" fill="#2563eb" font-size="8" font-weight="600">Shark sonnet</text>
  <rect x="713" y="297" width="65" height="18" rx="9" fill="#faf5ff" stroke="#ddd6fe" stroke-width="0.5"/>
  <text x="745" y="309" text-anchor="middle" fill="#7c3aed" font-size="8" font-weight="600">Pro opus</text>

  <text x="440" y="333" fill="#64748b" font-size="9.5">Each bot has unique personality, habits, and</text>
  <text x="440" y="349" fill="#64748b" font-size="9.5">thinking style. Strategy docs isolated by skill</text>
  <text x="440" y="365" fill="#64748b" font-size="9.5">level: fish gets nothing, pro gets full GTO.</text>
  <text x="440" y="381" fill="#64748b" font-size="9.5">Create new bots with natural language.</text>

  <rect x="440" y="395" width="340" height="1" fill="#e2e8f0"/>
  <text x="440" y="413" fill="#94a3b8" font-size="8" font-weight="600">USAGE</text>
  <text x="440" y="431" fill="#475569" font-size="9">"加几个bot进来"</text>
  <text x="575" y="431" fill="#94a3b8" font-size="9">— Add preset bots</text>
  <text x="440" y="449" fill="#475569" font-size="9">"加一个喜欢bluff的老头"</text>
  <text x="625" y="449" fill="#94a3b8" font-size="9">— NL creation</text>
  <text x="440" y="467" fill="#475569" font-size="9">"建一个TAG bot，用opus"</text>
  <text x="625" y="467" fill="#94a3b8" font-size="9">— Style + model</text>

  <!-- Feature 5: Poker Tutorial -->
  <rect x="15" y="505" width="390" height="260" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="15" y="505" width="4" height="260" rx="2" fill="#f59e0b"/>
  <text x="40" y="532" fill="#1e293b" font-size="13" font-weight="700">5 Poker Tutorial</text>
  <rect x="40" y="542" width="72" height="18" rx="9" fill="#fffbeb" stroke="#fde68a" stroke-width="0.5"/>
  <text x="76" y="554" text-anchor="middle" fill="#92400e" font-size="8" font-weight="600">Hand rank</text>
  <rect x="120" y="542" width="68" height="18" rx="9" fill="#fffbeb" stroke="#fde68a" stroke-width="0.5"/>
  <text x="154" y="554" text-anchor="middle" fill="#92400e" font-size="8" font-weight="600">Position</text>
  <rect x="196" y="542" width="78" height="18" rx="9" fill="#fffbeb" stroke="#fde68a" stroke-width="0.5"/>
  <text x="235" y="554" text-anchor="middle" fill="#92400e" font-size="8" font-weight="600">Pot Odds</text>
  <rect x="282" y="542" width="88" height="18" rx="9" fill="#fffbeb" stroke="#fde68a" stroke-width="0.5"/>
  <text x="326" y="554" text-anchor="middle" fill="#92400e" font-size="8" font-weight="600">Starting hand</text>

  <text x="40" y="578" fill="#64748b" font-size="9.5">CoachBot teaches poker fundamentals using</text>
  <text x="40" y="594" fill="#64748b" font-size="9.5">strategy docs as material. Pick a topic or</text>
  <text x="40" y="610" fill="#64748b" font-size="9.5">go through the full beginner guide. After</text>
  <text x="40" y="626" fill="#64748b" font-size="9.5">each concept: "Ready to practice? Let's play!"</text>

  <rect x="40" y="640" width="340" height="1" fill="#e2e8f0"/>
  <text x="40" y="658" fill="#94a3b8" font-size="8" font-weight="600">TOPICS</text>
  <text x="40" y="676" fill="#475569" font-size="9">Hand rankings</text>
  <text x="140" y="676" fill="#94a3b8" font-size="9">— What beats what</text>
  <text x="40" y="694" fill="#475569" font-size="9">Position</text>
  <text x="140" y="694" fill="#94a3b8" font-size="9">— Why position matters</text>
  <text x="40" y="712" fill="#475569" font-size="9">Pot odds</text>
  <text x="140" y="712" fill="#94a3b8" font-size="9">— When to call or fold (math)</text>
  <text x="40" y="730" fill="#475569" font-size="9">Starting hands</text>
  <text x="140" y="730" fill="#94a3b8" font-size="9">— Which hands to play and why</text>
  <text x="40" y="748" fill="#475569" font-size="9">Full beginner guide</text>
  <text x="160" y="748" fill="#94a3b8" font-size="9">— Everything from scratch</text>

  <!-- Feature 6: Auto Setup -->
  <rect x="415" y="505" width="390" height="260" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="415" y="505" width="4" height="260" rx="2" fill="#475569"/>
  <text x="440" y="532" fill="#1e293b" font-size="13" font-weight="700">6 Auto Setup</text>
  <rect x="440" y="542" width="72" height="18" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="476" y="554" text-anchor="middle" fill="#475569" font-size="8" font-weight="600">Node.js</text>
  <rect x="520" y="542" width="68" height="18" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="554" y="554" text-anchor="middle" fill="#475569" font-size="8" font-weight="600">Python</text>
  <rect x="596" y="542" width="65" height="18" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="628" y="554" text-anchor="middle" fill="#475569" font-size="8" font-weight="600">numpy</text>
  <rect x="669" y="542" width="55" height="18" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="696" y="554" text-anchor="middle" fill="#475569" font-size="8" font-weight="600">npm</text>
  <rect x="732" y="542" width="48" height="18" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="756" y="554" text-anchor="middle" fill="#475569" font-size="8" font-weight="600">MCP</text>

  <text x="440" y="578" fill="#64748b" font-size="9.5">First run auto-checks all dependencies.</text>
  <text x="440" y="594" fill="#64748b" font-size="9.5">Asks before each install. Saves status to</text>
  <text x="440" y="610" fill="#64748b" font-size="9.5">setup-status.json — skips on next session.</text>
  <text x="440" y="626" fill="#64748b" font-size="9.5">Missing deps? Shows which features still work.</text>

  <rect x="440" y="640" width="340" height="1" fill="#e2e8f0"/>
  <text x="440" y="658" fill="#94a3b8" font-size="8" font-weight="600">FEATURE LEVELS</text>
  <text x="440" y="676" fill="#16a34a" font-size="9">Offline Coaching</text>
  <text x="555" y="676" fill="#94a3b8" font-size="9">— Python + numpy</text>
  <text x="440" y="694" fill="#16a34a" font-size="9">Live CoachBot</text>
  <text x="555" y="694" fill="#94a3b8" font-size="9">— + Node.js + npm + Chrome ext</text>
  <text x="440" y="712" fill="#16a34a" font-size="9">PlayBots</text>
  <text x="555" y="712" fill="#94a3b8" font-size="9">— + claude CLI</text>
  <text x="440" y="730" fill="#16a34a" font-size="9">Full System</text>
  <text x="555" y="730" fill="#94a3b8" font-size="9">— ALL of the above</text>
  <text x="440" y="752" fill="#475569" font-size="9">"重新检查环境"</text>
  <text x="575" y="752" fill="#94a3b8" font-size="9">— Re-run setup anytime</text>
</svg>
