<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;">
  <rect width="720" height="380" fill="#f8f9fb" rx="10"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="700">How a Hand Plays Out</text>

  <!-- Vertical lifelines -->
  <line x1="100" y1="55" x2="100" y2="350" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="280" y1="55" x2="280" y2="350" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="460" y1="55" x2="460" y2="350" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="620" y1="55" x2="620" y2="350" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Participant headers -->
  <rect x="40" y="42" width="120" height="28" rx="6" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
  <text x="100" y="61" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">PokerNow</text>

  <rect x="220" y="42" width="120" height="28" rx="6" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
  <text x="280" y="61" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">orchestrator</text>

  <rect x="400" y="42" width="120" height="28" rx="6" fill="#2563eb" stroke="#1d4ed8" stroke-width="1"/>
  <text x="460" y="61" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">BotManager</text>

  <rect x="560" y="42" width="120" height="28" rx="6" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>
  <text x="620" y="61" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">CoachBot</text>

  <!-- Step 1: PokerNow → orchestrator: Alice's turn -->
  <line x1="100" y1="95" x2="280" y2="95" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <rect x="120" y="82" width="140" height="16" rx="3" fill="#fffbeb"/>
  <text x="190" y="93" text-anchor="middle" fill="#92400e" font-size="9">Alice's turn</text>

  <!-- Step 2: orchestrator self: write turn.json -->
  <rect x="285" y="105" width="145" height="16" rx="3" fill="#fff" stroke="#e2e8f0"/>
  <text x="357" y="116" text-anchor="middle" fill="#64748b" font-size="8.5">write Alice/turn.json</text>

  <!-- Step 3: BotManager → orchestrator: poll -->
  <line x1="460" y1="135" x2="280" y2="135" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="310" y="122" width="110" height="16" rx="3" fill="#eff6ff"/>
  <text x="365" y="133" text-anchor="middle" fill="#1e40af" font-size="9">poll - found Alice</text>

  <!-- Step 4: BotManager self: Agent decides -->
  <rect x="465" y="145" width="165" height="16" rx="3" fill="#fefce8" stroke="#fde68a"/>
  <text x="547" y="156" text-anchor="middle" fill="#a16207" font-size="8.5">Agent(sonnet) - raise 200</text>

  <!-- Step 5: BotManager → orchestrator: write action.json -->
  <line x1="460" y1="175" x2="280" y2="175" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="300" y="162" width="130" height="16" rx="3" fill="#eff6ff"/>
  <text x="365" y="173" text-anchor="middle" fill="#1e40af" font-size="9">write action.json</text>

  <!-- Step 6: orchestrator → PokerNow: execute -->
  <line x1="280" y1="195" x2="100" y2="195" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <rect x="120" y="182" width="140" height="16" rx="3" fill="#fffbeb"/>
  <text x="190" y="193" text-anchor="middle" fill="#92400e" font-size="9">Alice raises 200</text>

  <!-- Divider -->
  <line x1="60" y1="218" x2="680" y2="218" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>
  <rect x="330" y="210" width="60" height="16" rx="4" fill="#f8f9fb" stroke="#e2e8f0"/>
  <text x="360" y="221" text-anchor="middle" fill="#94a3b8" font-size="8">your turn</text>

  <!-- Step 7: PokerNow → CoachBot: your turn -->
  <line x1="100" y1="245" x2="620" y2="245" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="280" y="232" width="165" height="16" rx="3" fill="#fef2f2"/>
  <text x="362" y="243" text-anchor="middle" fill="#dc2626" font-size="9">Your turn (bridge - state.json)</text>

  <!-- Step 8: CoachBot self: analyze -->
  <rect x="505" y="258" width="220" height="16" rx="3" fill="#fff" stroke="#fecaca"/>
  <text x="615" y="269" text-anchor="middle" fill="#dc2626" font-size="8.5">Flop Td 7h 2c - equity 52% - raise 300</text>

  <!-- Step 9: CoachBot self: user confirms -->
  <rect x="540" y="282" width="160" height="16" rx="3" fill="#faf5ff" stroke="#ddd6fe"/>
  <text x="620" y="293" text-anchor="middle" fill="#7c3aed" font-size="8.5">User: "raise 300"</text>

  <!-- Step 10: CoachBot → PokerNow: execute -->
  <line x1="620" y1="310" x2="100" y2="310" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="280" y="297" width="170" height="16" rx="3" fill="#fef2f2"/>
  <text x="365" y="308" text-anchor="middle" fill="#dc2626" font-size="9">POST /action - bridge executes</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Legend -->
  <g transform="translate(60, 340)">
    <line x1="0" y1="8" x2="20" y2="8" stroke="#d97706" stroke-width="1.5"/>
    <text x="26" y="12" fill="#94a3b8" font-size="8.5">Orchestrator / PokerNow</text>
    <line x1="160" y1="8" x2="180" y2="8" stroke="#2563eb" stroke-width="1.5"/>
    <text x="186" y="12" fill="#94a3b8" font-size="8.5">BotManager</text>
    <line x1="270" y1="8" x2="290" y2="8" stroke="#dc2626" stroke-width="1.5"/>
    <text x="296" y="12" fill="#94a3b8" font-size="8.5">CoachBot (main session)</text>
  </g>
</svg>
