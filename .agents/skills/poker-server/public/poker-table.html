  match = text.match(/^Hand\s*#(\d+)\s*review$/i);
  if (match) return { card: true, text: `Hand #${match[1]} review`, hand: match[1], actor: 'CoachBot', verb: 'review', detail: '' };
  match = text.match(/^🔄\s*CoachBot\s*定期维护中（第\s*(\d+)\s*次调用触发，每\s*(\d+)\s*次一次）$/);
  if (match) return { card: false, text: `CoachBot maintenance running (${match[1]}/${match[2]})` };
  if (/^✓\s*CoachBot\s*刷新完成$/.test(text)) return { card: false, text: 'CoachBot refreshed' };
  return { card: false, text: text
    .replace(/^CoachBot\s*维护失败:/, 'CoachBot maintenance failed:')
    .replace(/^★\s*/, '') };
}

function addCoachMessage(msg, opts) {
  const log = document.getElementById('coach-log');
  if (!log) return;
  const role = msg.role || 'assistant';
  const hasAssistantCards = Array.isArray(msg.cards) && msg.cards.length > 0;
  if (role === 'assistant' && !String(msg.content || '').trim() && !hasAssistantCards) return;
  const messageId = coachMessageKey(msg);
  if (messageId && coachMessageIds.has(messageId)) return;
  if (messageId) coachMessageIds.add(messageId);
  // Insert before the thinking indicator if it's present (keeps it pinned to bottom)
  const thinking = document.getElementById('coach-thinking-indicator');

  const div = document.createElement('div');
  div.className = 'coach-msg ' + role;
  if (messageId) div.dataset.messageId = messageId;
  if (msg.ts) div.dataset.ts = msg.ts;

  const ts = msg.ts ? new Date(msg.ts).toLocaleTimeString() : '';
  const tsHTML = ts ? `<div class="coach-msg-ts">${ts}</div>` : '';
  const systemEvent = role === 'system' ? normalizeSystemCoachEvent(msg.content || '') : null;
  const displayContent = systemEvent ? systemEvent.text : (msg.content || '');
  const safe = escapeHTML(displayContent);
  // CoachBot assistant replies are markdown — render inline bold/code/headers
  // AFTER escaping (the transformations only touch `**` and backticks, which
  // escapeHTML doesn't alter, so injected HTML can't smuggle through).
  let body;
  if (role === 'assistant') {
    body = renderCoachMarkdown(msg.content || '');
  } else if (role === 'log' && msg.logData) {
    // Structured action-log payload → render with colored spans for actor /
    // verb / amount, so a glance shows who did what. Falls back to plain
    // `content` if structured fields are missing (older relay builds).
    const d = msg.logData;
    const verbRaw = String(d.verb || '');
    const verbKey = verbRaw.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    const toneKey = ({
      fold: 'fold',
      check: 'check',
      call: 'call',
      bet: 'bet',
      raise: 'raise',
      sb: 'blind',
      bb: 'blind',
      blind: 'blind',
      'small-blind': 'blind',
      'big-blind': 'blind',
    })[verbKey] || '';
    if (toneKey) div.classList.add('log-' + toneKey);
    if (d.isMe) div.classList.add('log-me');
    const handS = d.hand != null ? `<span class="log-hand">#${escapeHTML(String(d.hand))}</span>` : '';
    const actorS = `<span class="log-actor${d.isMe ? ' me' : ''}">${escapeHTML(d.actor || '?')}${d.isMe ? ' (me)' : ''}</span>`;
    const verbLabel = d.amount ? `${verbRaw} $${d.amount}` : verbRaw;
    const verbS = `<span class="log-verb">${escapeHTML(verbLabel)}</span>`;
    body = `<span class="log-live-dot"></span>${handS}${actorS}${verbS}`;
  } else if (role === 'system' && systemEvent && systemEvent.card) {
    div.className = 'coach-msg log log-me system-event';
    const handS = systemEvent.hand ? `<span class="log-hand">#${escapeHTML(String(systemEvent.hand))}</span>` : '';
    const actorS = `<span class="log-actor me">${escapeHTML(systemEvent.actor || 'Game')}</span>`;
    const verbS = `<span class="log-verb">${escapeHTML(systemEvent.verb || 'event')}</span>`;
    const detailS = systemEvent.detail ? `<span class="log-detail">${escapeHTML(systemEvent.detail)}</span>` : '';
    body = `${tsHTML}<span class="log-live-dot"></span>${handS}${actorS}${verbS}${detailS}`;
  } else {
    body = safe;
  }
  // Error bubbles get a dismiss button so a cluttered chat can be cleaned up.
  // Errors are ephemeral (not persisted) so clicking × just removes the DOM node.
  const closeBtn = role === 'error'
    ? '<span class="coach-msg-close" title="dismiss">×</span>'
    : '';
  if (role === 'assistant') {
    if (Array.isArray(msg.cards) && msg.cards.length) {
      div.appendChild(renderCoachCardsHost(msg.cards, msg.workedMs));
    }
    const contentEl = document.createElement('div');
    contentEl.className = 'coach-msg-body markdown-content';
    contentEl.innerHTML = body;
    div.appendChild(contentEl);
  } else if (role === 'system') {
    if (systemEvent && systemEvent.card) {
      div.innerHTML = body;
    } else {
      const inlineTs = ts ? `<span class="coach-msg-ts-inline">${escapeHTML(ts)}</span>` : '';
      div.innerHTML = `<span class="system-dot"></span>${inlineTs}<span class="system-text">${safe}</span>`;
    }
  } else if (role === 'user') {
    div.innerHTML = body + closeBtn;
  } else {
    div.innerHTML = tsHTML + body + closeBtn;
  }
  if (role === 'error') {
    const btn = div.querySelector('.coach-msg-close');
    if (btn) btn.addEventListener('click', () => div.remove());
  }

  const tsMs = Date.parse(msg.ts || '');
  const shouldSortByTime = Number.isFinite(tsMs)
    && (!opts || opts.fromServer || opts.fromStorage || role === 'assistant');
  if (opts && opts.prepend) {
    const moreBtn = ensureCoachHistoryMoreButton();
    log.insertBefore(div, moreBtn ? moreBtn.nextSibling : log.firstChild);
  } else if (shouldSortByTime) {
    const next = Array.from(log.querySelectorAll('.coach-msg[data-ts]'))
      .find(node => (Date.parse(node.dataset.ts || '') || 0) > tsMs);
    if (next) log.insertBefore(div, next);
    else if (thinking) log.insertBefore(div, thinking);
    else log.appendChild(div);
  } else if (thinking) log.insertBefore(div, thinking);
  else log.appendChild(div);
  // User-sent bubbles always snap to bottom (they just submitted; the input
  // is below the log, so they're expecting to see their message). For
  // assistant / log / hydration, only scroll if the user is pinned near
  // the bottom — otherwise they scrolled up intentionally.
  if (opts && opts.prepend) {
    // Keep the viewport stable while older messages are inserted above.
  } else if (role === 'user') scrollCoachToBottom();
  else scrollCoachIfNear();

  // Persist to localStorage so panel survives page refresh.
  // `opts.fromStorage` is set during hydration — don't re-save those.
  // Only 'error' is ephemeral (tied to a specific stale action that's already past).
  // 'log' entries (action history) persist so the chat timeline is intact after refresh.
  const ephemeral = role === 'error';
  if (!ephemeral && (!opts || (!opts.fromStorage && !opts.fromServer))) persistCoachMessage(msg, opts);
}

// ── CoachBot panel persistence (bounded local cache) ──
const COACH_HISTORY_KEY = 'pokerbot.coachHistory.v3';
const COACH_HISTORY_CAP = 120;
const COACH_HISTORY_LOG_CAP = 40;
const COACH_STORED_CARD_CAP = 24;
const COACH_STORED_CARD_TEXT_CAP = 1200;
const COACH_HISTORY_PAGE_SIZE = 120;
let coachHistoryHasMore = true;
let coachHistoryLoading = false;
function loadCoachHistory() {
  try {
    const raw = localStorage.getItem(COACH_HISTORY_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (_) { return []; }
}
function compactStoredCard(card) {
  if (!card || typeof card !== 'object') return null;
  const out = {
    id: String(card.id || `stored-card-${Date.now()}`),
    kind: String(card.kind || 'item'),
    title: String(card.title || 'Step'),
  };
  if (card.detail) out.detail = compactStreamText(card.detail, COACH_STORED_CARD_TEXT_CAP);
  if (card.body) out.body = compactStreamText(card.body, COACH_STORED_CARD_TEXT_CAP);
  if (card.status) out.status = String(card.status);
  if (card.tone) out.tone = String(card.tone);
  if (Array.isArray(card.changes)) {
    out.changes = card.changes.slice(0, 12).map(change => ({
      path: String(change.path || ''),
      additions: Number(change.additions) || 0,
      deletions: Number(change.deletions) || 0,
    })).filter(change => change.path);
  }
  return out;
}
function compactCoachHistory(entries) {
  const kept = [];
  let logCount = 0;
  for (let i = entries.length - 1; i >= 0; i--) {
    const entry = entries[i];
    if (!entry) continue;
    if (entry.role === 'log') {
      if (logCount >= COACH_HISTORY_LOG_CAP) continue;
      logCount += 1;
    }
    kept.push(entry);
    if (kept.length >= COACH_HISTORY_CAP) break;
  }
  return kept.reverse();
}
function oldestCoachMessageTs() {
  const log = document.getElementById('coach-log');
  if (!log) return '';
  const nodes = Array.from(log.querySelectorAll('.coach-msg[data-ts]'));
  return nodes.length ? (nodes[0].dataset.ts || '') : '';
}
function ensureCoachHistoryMoreButton() {
  const log = document.getElementById('coach-log');
  if (!log) return null;
  let btn = document.getElementById('coach-history-more');
  if (!btn) {
    btn = document.createElement('button');
    btn.id = 'coach-history-more';
    btn.className = 'coach-history-more hidden';
    btn.type = 'button';
    btn.textContent = 'Earlier messages';
    btn.addEventListener('click', () => loadOlderCoachHistory());
    log.insertBefore(btn, log.firstChild);
  }
  btn.classList.toggle('hidden', !coachHistoryHasMore);
  return btn;
}
async function fetchCoachHistoryPage(before) {
  const qs = new URLSearchParams({ limit: String(COACH_HISTORY_PAGE_SIZE) });
  if (before) qs.set('before', before);
  const res = await fetch('/coach-ui-history?' + qs.toString());
  const payload = await res.json().catch(() => null);
  if (!res.ok || !payload || payload.ok === false) throw new Error(payload?.error || `HTTP ${res.status}`);
  return payload;
}
async function loadOlderCoachHistory() {
  if (coachHistoryLoading) return;
  coachHistoryLoading = true;
  const log = document.getElementById('coach-log');
  const oldHeight = log ? log.scrollHeight : 0;
  const oldTop = log ? log.scrollTop : 0;
  const btn = ensureCoachHistoryMoreButton();
  if (btn) btn.textContent = 'Loading...';
  try {
    const payload = await fetchCoachHistoryPage(oldestCoachMessageTs());
    const messages = Array.isArray(payload.messages) ? payload.messages : [];
    coachHistoryHasMore = !!payload.hasMore;
    for (let i = messages.length - 1; i >= 0; i--) {
      addCoachMessage(messages[i], { fromServer: true, prepend: true });
    }
    if (log) log.scrollTop = oldTop + (log.scrollHeight - oldHeight);
  } catch (e) {
    addCoachMessage({ role: 'error', content: friendlyRuntimeError('History load failed', e), ts: new Date().toISOString() });
  } finally {
    coachHistoryLoading = false;
    const nextBtn = ensureCoachHistoryMoreButton();
    if (nextBtn) nextBtn.textContent = 'Earlier messages';
  }
}
async function hydrateCoachHistoryFromServer() {
  try {
    const payload = await fetchCoachHistoryPage('');
    const messages = Array.isArray(payload.messages) ? payload.messages : [];
    coachHistoryHasMore = !!payload.hasMore;
    for (const m of messages) addCoachMessage(m, { fromServer: true });
    ensureCoachHistoryMoreButton();
  } catch (_) {
    ensureCoachHistoryMoreButton();
  }
}
async function persistCoachMessageToServer(entry) {
  try {
    await fetch('/coach-ui-history', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry),
    });
  } catch (_) { /* relay may be offline during teardown */ }
}
function persistCoachMessage(msg, opts) {
  try {
    const arr = loadCoachHistory();
    const entry = {
      id: msg.id || makeCoachMessageId(),
      role: msg.role || 'assistant',
      content: msg.content || '',
      ts: msg.ts || new Date().toISOString(),
    };
    // Preserve structured payload so action-log bubbles re-render correctly after refresh.
    if (msg.logData) entry.logData = msg.logData;
    if (Array.isArray(msg.cards) && msg.cards.length) {
      entry.cards = msg.cards.map(compactStoredCard).filter(Boolean).slice(-COACH_STORED_CARD_CAP);
    }
    if (msg.workedMs) entry.workedMs = Number(msg.workedMs) || null;
    arr.push(entry);
    localStorage.setItem(COACH_HISTORY_KEY, JSON.stringify(compactCoachHistory(arr)));
    if (!opts || !opts.fromServer) persistCoachMessageToServer(entry);
  } catch (_) { /* quota / serialization — ignore */ }
}
function hydrateCoachHistory() {
  const arr = loadCoachHistory();
  for (const m of arr) addCoachMessage(m, { fromStorage: true });
  hydrateCoachHistoryFromServer();
}
function clearCoachHistoryCache() {
  try { localStorage.removeItem(COACH_HISTORY_KEY); } catch (_) {}
  coachMessageIds.clear();
  coachHistoryHasMore = true;
}
function clearCoachHistory() {
  clearCoachHistoryCache();
  const log = document.getElementById('coach-log');
  if (log) log.innerHTML = '';
}

let coachMode = 'manual';
let coachModePending = false;

function updateCoachModeControls(mode, pending) {
  if (mode === 'auto' || mode === 'manual') coachMode = mode;
  if (typeof pending === 'boolean') coachModePending = pending;
  for (const btn of document.querySelectorAll('.coach-mode-btn')) {
    const active = btn.dataset.mode === coachMode;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    btn.disabled = coachModePending;
  }
}

async function refreshCoachMode() {
  try {
    const res = await fetch('/mode');
    const payload = await res.json();
    if (payload && payload.mode) updateCoachModeControls(payload.mode, false);
  } catch (_) {
    updateCoachModeControls(coachMode, false);
  }
}

function friendlyRuntimeError(prefix, error) {
  const raw = (error && error.message) ? error.message : String(error || 'Unknown error');
  const lower = raw.toLowerCase();
  if (lower.includes('failed to fetch') || lower.includes('econnrefused') || lower.includes('networkerror')) {
    return `${prefix}: PokerBot runtime is offline. Start PokerBot and try again.`;
  }
  return `${prefix}: ${raw}`;
}

async function sendCoachModeCommand(mode) {
  if (mode !== 'auto' && mode !== 'manual') return;
  if (coachModePending || mode === coachMode) return;
  updateCoachModeControls(coachMode, true);
  try {
    const res = await fetch('/mode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode }),
    });
    const payload = await res.json().catch(() => null);
    if (!res.ok || (payload && payload.ok === false)) {
      throw new Error((payload && payload.error) || `HTTP ${res.status}`);
    }
    updateCoachModeControls((payload && payload.mode) || mode, false);
  } catch (e) {
    updateCoachModeControls(coachMode, false);
    addCoachMessage({ role: 'error', content: friendlyRuntimeError('Mode switch failed', e), ts: new Date().toISOString() });
  }
}

function setCoachThinking(on, opts) {
  const log = document.getElementById('coach-log');
  const input = document.getElementById('coach-input');
  const sendBtn = document.getElementById('coach-send-btn');
  if (!log) return;
  let indicator = document.getElementById('coach-thinking-indicator');
  if (on) {
    if (!indicator) {
      indicator = document.createElement('div');
      indicator.id = 'coach-thinking-indicator';
      indicator.className = 'coach-thinking';
      indicator.innerHTML = '<span class="coach-thinking-label">CoachBot thinking</span>'
        + '<span class="coach-thinking-dots" aria-hidden="true"><span></span><span></span><span></span></span>';
      log.appendChild(indicator);
      scrollCoachIfNear();
    }
    if (input) input.disabled = true;
    if (sendBtn) sendBtn.disabled = true;
  } else {
    if (indicator) indicator.remove();
    pruneEmptyStreamingCoachBubbles(opts && opts.exceptId);
    if (input) input.disabled = false;
    if (sendBtn) sendBtn.disabled = false;
  }
}

async function askCoach() {
  const input = document.getElementById('coach-input');
  if (!input) return;
  const q = (input.value || '').trim();
  if (!q) return;
  input.value = '';
  setCoachThinking(true);
  try {
    // Reply comes back via WS broadcast — HTTP response is redundant.
    const res = await fetch('/coach-ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, displayQuestion: q, allowAction: false }),
    });
    const payload = await res.json().catch(() => null);
    if (!res.ok || (payload && payload.ok === false)) {
      throw new Error((payload && payload.error) || `HTTP ${res.status}`);
    }
  } catch (e) {
    addCoachMessage({ role: 'error', content: friendlyRuntimeError('Request failed', e), ts: new Date().toISOString() });
  } finally {
    setCoachThinking(false);
  }
}

// ══════════════════════════════════════════════════
// VIEWPORT SCALING — fit the fixed poker table canvas to any window size
// ══════════════════════════════════════════════════
const DESIGN_W_FALLBACK = 640, DESIGN_H_FALLBACK = 690;
const MAX_TABLE_SCALE = 2.2;
// The whole right-side game interface scales only from height. The game stage
// clips horizontally when CoachBot leaves less room than this fixed-aspect UI needs.
const SCALER_MARGIN_Y = 12;
function cssLengthPx(rawValue, fallback) {
  const raw = String(rawValue || '').trim();
  const value = parseFloat(raw);
  if (!Number.isFinite(value)) return fallback;
  if (raw.endsWith('rem')) {
    const rootSize = parseFloat(getComputedStyle(document.documentElement).fontSize || '16');
    return value * (Number.isFinite(rootSize) ? rootSize : 16);
  }
  if (raw.endsWith('vw')) return window.innerWidth * value / 100;
  if (raw.endsWith('vh')) return window.innerHeight * value / 100;
  return value;
}
function rootVarPx(name, fallback) {
  return cssLengthPx(getComputedStyle(document.documentElement).getPropertyValue(name), fallback);
}
function designWidthPx() { return rootVarPx('--game-design-width', DESIGN_W_FALLBACK); }
function designHeightPx() { return rootVarPx('--game-design-height', DESIGN_H_FALLBACK); }
function gameScaleForHeight(contentH) {
  const stage = document.getElementById('game-stage');
  const stageH = stage?.clientHeight || Math.max(0, (window.visualViewport?.height || window.innerHeight) - (document.getElementById('stuclaw-app-window-chrome')?.offsetHeight || 0));
  const availH = Math.max(0, stageH - SCALER_MARGIN_Y * 2);
  return Math.min(MAX_TABLE_SCALE, availH / contentH);
}
function fitScaler() {
  const stage = document.getElementById('game-stage');
  const shell = document.getElementById('game-shell');
  const scaler = document.getElementById('scaler');
  if (!stage || !shell || !scaler) return;
  const stageH = Math.max(0, stage.clientHeight);
  const availH = Math.max(0, stageH - SCALER_MARGIN_Y * 2);
  const designW = designWidthPx();
  const designH = designHeightPx();
  const contentH = designH;
  const scale = gameScaleForHeight(contentH);
  scaler.style.transform = `scale(${scale})`;
  const scaledW = designW * scale;
  const scaledH = contentH * scale;
  const viewportW = window.visualViewport?.width || window.innerWidth;
  const stageW = Math.max(0, scaledW);
  const coachW = Math.max(0, viewportW - stageW);
  document.documentElement.style.setProperty('--game-stage-width', stageW + 'px');
  document.documentElement.style.setProperty('--coach-panel-width', coachW + 'px');
  shell.style.width = stageW + 'px';
  shell.style.height = stageH + 'px';
  const localOffsetX = 0;
  const offsetY = SCALER_MARGIN_Y + Math.max(0, (availH - scaledH) / 2);
  scaler.style.left = localOffsetX + 'px';
  scaler.style.top = offsetY + 'px';
}
function scheduleFitScaler() {
  requestAnimationFrame(fitScaler);
  setTimeout(fitScaler, 120);
  setTimeout(fitScaler, 360);
}
window.addEventListener('resize', scheduleFitScaler);
window.addEventListener('focus', scheduleFitScaler);
window.addEventListener('pageshow', scheduleFitScaler);
fitScaler();
// Retry scaling after layout settles (fixes preview panel initial size issue)
setTimeout(fitScaler, 100);
setTimeout(fitScaler, 500);

function sendWS(type, data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type, ...data }));
    return true;
  }
  addChatMessage('Error', 'Table is disconnected');
  return false;
}

// ── Game actions (fold / check / call / raise) ──
// Submit through relay HTTP so errors are visible and state refreshes
// immediately after the upstream server accepts the action.
async function submitAction(payload) {
  try {
    const res = await fetch('/action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const result = await res.json().catch(() => ({}));
    if (!res.ok || result.ok === false) {
      addChatMessage('Error', result.error || `Action failed (${res.status})`);
      return;
    }
    const state = await fetch('/state').then(r => r.json()).catch(() => null);
    if (state && state.phase) {
      currentState = state;
      scheduleRender(currentState);
    }
  } catch (err) {
    addChatMessage('Error', err.message || 'Action failed');
  }
}
function actFold()  { submitAction({ action: 'fold' }); }
function actCheck() { submitAction({ action: 'check' }); }
function actCall()  { submitAction({ action: 'call' }); }
function actRaiseFromInput() {
  const input = document.getElementById('raise-input');
  if (!input) return;
  const amount = parseInt(input.value, 10);
  if (!isFinite(amount) || amount <= 0) return;
  const min = parseInt(input.min, 10) || 0;
  const max = parseInt(input.max, 10) || amount;
  if (amount < min || amount > max) {
    addChatMessage('Error', `Raise must be between $${min} and $${max}`);
    return;
  }
  submitAction({ action: 'raise', amount });
}
function setRaise(amount) {
  const input = document.getElementById('raise-input');
  if (input) input.value = amount;
}

function toggleSitOut() {
  if (isSittingOut) {
    if (!sendWS('sit_back')) return;
    isSittingOut = false;
    addChatMessage('System', 'Sitting back in');
    updateControlButtons();
  } else {
    if (!sendWS('sit_out')) return;
    isSittingOut = true;
    addChatMessage('System', 'Sitting out after this hand');
    updateControlButtons();
  }
}

let activeTableModal = null;

function modalFooter(buttons) {

    `<button class="modal-btn ${btn.className || ''}" onclick="${btn.action}">${btn.label}</button>`
  ).join('');
}

function openTableModal(kind) {

  if (!backdrop || !title || !body || !footer) return;

  const me = currentState && (currentState.players || []).find(p => p.name === myName);
  const stack = me ? me.stack : 0;

  if (kind === 'rebuy') {
    title.textContent = 'Rebuy chips';
    body.innerHTML = `
      <div class="modal-copy">Add chips to your stack. This does not change the current hand action.</div>
      <div class="modal-row">
        <label>Current stack</label>
        <span>$${stack}</span>
      </div>
      <div class="modal-row">
        <label>Amount</label>
        <input id="modal-rebuy-amount" class="modal-input" type="number" min="1" step="10" value="1000">
      </div>

    footer.innerHTML = modalFooter([
      { label: 'Cancel', action: 'closeTableModal()' },
      { label: 'Rebuy', action: 'submitRebuy()', className: 'modal-primary' },
    ]);
  } else if (kind === 'settings') {
    title.textContent = 'Table settings';
    const sb = currentState ? currentState.smallBlind || 10 : 10;
    const bb = currentState ? currentState.bigBlind || 20 : 20;
    const autoStart = !currentState || currentState.autoStart !== false;
    body.innerHTML = `
      <div class="modal-copy">Settings apply to future hands. Blinds update immediately when the server accepts them.</div>
      <div class="modal-row">
        <label>Small blind</label>
        <input id="set-sb" class="modal-input" type="number" min="1" value="${sb}">
      </div>
      <div class="modal-row">
        <label>Big blind</label>
        <input id="set-bb" class="modal-input" type="number" min="1" value="${bb}">
      </div>
      <div class="modal-row">
        <label>Auto-start hands</label>
        <input id="set-autostart" class="modal-check" type="checkbox" ${autoStart ? 'checked' : ''}>
      </div>
    `;
    footer.innerHTML = modalFooter([
      { label: 'Cancel', action: 'closeTableModal()' },
      { label: 'Apply', action: 'applySettings()', className: 'modal-primary' },
    ]);
  }

  backdrop.classList.remove('hidden');
  updateControlButtons();
  setTimeout(() => {
    const input = body.querySelector('input[type="number"]');
    if (input) input.focus();
  }, 0);
}

function closeTableModal() {
  activeTableModal = null;
  document.getElementById('table-modal-backdrop')?.classList.add('hidden');
  updateControlButtons();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && activeTableModal) closeTableModal();
});

function requestRebuy() {
  openTableModal('rebuy');
}

function submitRebuy() {
  const amount = parseInt(document.getElementById('modal-rebuy-amount')?.value, 10);
  if (!Number.isFinite(amount) || amount <= 0) {
    addChatMessage('Error', 'Enter a positive rebuy amount');
    return;
  }
  if (sendWS('rebuy', { amount })) {
    addChatMessage('System', `Rebuy requested: $${amount}`);
    closeTableModal();
  }
}

function togglePause() {
  if (isPaused) {
    if (sendWS('resume')) addChatMessage('System', 'Resume requested');
  } else {
    if (sendWS('pause')) addChatMessage('System', 'Pause requested');
  }
}

function toggleSettings() {
  if (activeTableModal === 'settings') closeTableModal();
  else openTableModal('settings');
}

function applySettings() {
  const sb = parseInt(document.getElementById('set-sb').value) || 10;
  const bb = parseInt(document.getElementById('set-bb').value) || 20;
  const autoStart = document.getElementById('set-autostart').checked;
  if (sendWS('settings', { smallBlind: sb, bigBlind: bb, autoStart })) {
    addChatMessage('System', `Settings requested: blinds ${sb}/${bb}, auto-start=${autoStart}`);
    closeTableModal();
  }
}

function kickPlayer(name) {
  if (confirm(`Kick ${name}?`)) {
    sendWS('kick', { name });
  }
}

function updateControlButtons() {
  const connected = !!(ws && ws.readyState === WebSocket.OPEN);
  const btnSitout = document.getElementById('btn-sitout');
  if (btnSitout) {
    btnSitout.innerHTML = isSittingOut
      ? '<span class="ctrl-icon">↩</span><span>Sit back</span>'
      : '<span class="ctrl-icon">--</span><span>Sit out</span>';
    btnSitout.className = isSittingOut ? 'ctrl-btn ctrl-start active' : 'ctrl-btn ctrl-sitout';
    btnSitout.disabled = !connected;
  }
  const btnPause = document.getElementById('btn-pause');
  if (btnPause) {
    btnPause.innerHTML = isPaused
      ? '<span class="ctrl-icon">▶</span><span>Resume</span>'
      : '<span class="ctrl-icon">Ⅱ</span><span>Pause</span>';
    btnPause.className = isPaused ? 'ctrl-btn ctrl-start active' : 'ctrl-btn ctrl-pause';
    btnPause.disabled = !connected;
  }
  document.getElementById('paused-badge')?.classList.toggle('hidden', !isPaused);
  // Show start button only when waiting
  const btnStart = document.getElementById('btn-start');
  if (btnStart && currentState) {
    btnStart.style.display = currentState.phase === 'waiting' ? '' : 'none';
    btnStart.disabled = !connected || currentState.phase !== 'waiting';
  }
  const btnRebuy = document.getElementById('btn-rebuy');
  if (btnRebuy) btnRebuy.disabled = !connected;
  const btnSettings = document.getElementById('btn-settings');
  if (btnSettings) {
    btnSettings.className = activeTableModal === 'settings'
      ? 'ctrl-btn ctrl-settings active'
      : 'ctrl-btn ctrl-settings';
    btnSettings.disabled = !connected;
  }
}

// ══════════════════════════════════════════════════
// TURN TIMER UI
// ══════════════════════════════════════════════════

function startTurnTimerUI(deadline) {
  stopTurnTimerUI();
  if (!deadline) return;
  const timerEl = document.getElementById('turn-timer');
  const barEl = document.getElementById('turn-timer-bar');
  timerEl.classList.remove('hidden');
  const total = window._turnTimeout || 180000;
  const remaining = Math.max(0, deadline - Date.now());
  if (remaining <= 0) { stopTurnTimerUI(); return; }
  const startPct = (remaining / total) * 100;
  // Pure CSS animation — no setInterval needed
  barEl.style.setProperty('--timer-duration', remaining + 'ms');
  barEl.style.setProperty('--timer-start-scale', String(startPct / 100));
  barEl.classList.remove('animating');
  void barEl.offsetWidth; // force reflow to restart animation
  barEl.classList.add('animating');
  // Auto-hide when done
  turnTimerInterval = setTimeout(() => stopTurnTimerUI(), remaining);
}

function stopTurnTimerUI() {
  if (turnTimerInterval) { clearTimeout(turnTimerInterval); turnTimerInterval = null; }
  const timerEl = document.getElementById('turn-timer');
  const barEl = document.getElementById('turn-timer-bar');
  if (timerEl) timerEl.classList.add('hidden');
  if (barEl) barEl.classList.remove('animating');
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
drawZoneLines(); // Static — only needs to run once

// Enter sends, Shift+Enter inserts newline (chat convention).
// `isComposing` guard: when a CJK IME is open (picking a candidate)
// input), the Enter that commits the candidate must NOT submit the form —
// it's composition input, not a chat send. `keyCode === 229` covers older
// browsers that don't set isComposing on the actual keydown.
document.getElementById('coach-input')?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
    e.preventDefault();
    askCoach();
  }
});

// Restore coach panel from localStorage before WS connects, so chat history
// survives page refreshes (WS broadcasts are ephemeral — no server-side log).
hydrateCoachHistory();
refreshCoachMode();
// After hydration, force-snap to the latest message so the user lands at the
// bottom. scrollCoachIfNear in addCoachMessage keeps us pinned as each
// historical bubble appends, but on a very tall log the first append may
// start non-near-bottom; this is the safety net.
scrollCoachToBottom();

// Wire the floating "New messages" button to hide once the user scrolls back to
// the bottom on their own (either by dragging the scrollbar or wheeling).
(function () {
  const log = document.getElementById('coach-log');
  if (!log) return;
  log.addEventListener('scroll', () => {
    if (coachIsNearBottom(log)) hideCoachScrollBtn();
    if (log.scrollTop < 80 && coachHistoryHasMore && !coachHistoryLoading) {
      loadOlderCoachHistory();
    }
  });
})();

connectWS();
</script>
